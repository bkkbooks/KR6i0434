body:
  text: 失譯人今附西晉録聞如是一時佛在為耶國時有多樹木處與衆比丘僧俱比丘有五百人月十五日盛滿時夜半寂然安靜比丘僧自相難問時栴檀調弗天人持天形狀威神光耀來直前趣佛至佛前已悉脫身上珍寶著一面但披一領衣前以頭面著佛足禮畢問佛言諸可過去佛正覺弟子有經經名頞多和多耆佛弟子今亦復說是頞多和多耆經願佛為我說是經當使弟子奉持佛默然不應栴檀調弗稽首而却坐佛即為比丘僧說經言我為若說頞多和多耆經皆聽著心中念之勿得忘比丘言願佛說我皆當受經戒佛言布施有八事何謂為八愚癡人布施但布施不知其恩善所在既布施不達世間無有常癡人持作常世間苦無極愚人持作樂世間所有愚人言是我所有可常得世間人皆顛倒不淨臭處惡露愚人用作好不知作善得善作惡得惡愚人施與人不知其人德深淺持善心施與得道者福不可量佛告諸比丘何以知愚人不知布施有十因緣何等為十愚人布施不知為尊自用所與者得善愚人不至心施與人也愚人既施與人與時不敬重不自手與傳教人與施人不欲望其福不即得其福者自用忘其福愚人施與佛辟支佛阿羅漢不能自知其福大愚人施與不信佛辟支佛阿羅漢阿那含斯陀含須陀洹皆用為棄損無有後生愚人施與欲但得名字欲使人稱譽是為愚人布施佛說經已栴檀調弗及諸比丘皆歡喜前為佛作禮
